<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/styles/main.css">
</head>

<body>
    <form action="" class="dni-form">
        <div class="intro-form">
            <h1 class="heading-form">Bienvenid@ a Calculadora DNI</h1>
            <h2>Calcula tu letra del DNI</h2>
            <button type="button" id="button-call">Iniciar</button>
        </div>
        <div id="calculator">
            <label for="numero">Introduce un número:</label><br>
            <input type="text" id="number-form" name="numero" placeholder="ej: 12345678">
            <div id="result-message"></div>
            <button type="button" id="calculate-button">Calcular</button>
            <button type="button" id="cancel-button">Cancelar</button>
        </div>
    </form>
    <script type="module">
        import { init } from './src/js/button.js';
        init();
    </script>
    <script type="module">
        import { initCalculator } from './src/js/dom.js';
        initCalculator();
    </script>
</body>

</html>
